dataset:
  name: imagenet
  data_root: ../data    # data_root/imagenet/train, data_root/imagenet/val
  num_workers: 8

train:
  batch_size: 64
  epochs: 30
  seed: 42
  weight_mode: equal    # equal | linear (exit head loss weight mode)

optimizer:
  lr: 1.0e-3
  weight_decay: 0.05

scheduler:
  type: cosine
  T_max: 30
  eta_min: 1.0e-5

# ── SelectiveExitViT presets (merged by train_vit_selective.py) ───────────────
vit:
  data_root: ../data
  num_workers: 8
  train:
    batch_size: 64
    epochs: 30
    seed: 42
    weight_mode: equal
  optimizer:
    lr: 1.0e-3
    weight_decay: 0.05
  scheduler:
    T_max: 30
    eta_min: 1.0e-5
