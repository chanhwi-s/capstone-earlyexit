dataset:
  name: cifar10
  data_root: ../data
  num_workers: 2

train:
  batch_size: 128
  epochs: 100
  seed: 42
  w1: 0.3
  w2: 0.3
  w3: 1.0

optimizer:
  lr: 0.1
  momentum: 0.9
  weight_decay: 5e-4

# CosineAnnealingLR: lr을 100 epoch에 걸쳐 0까지 cosine 곡선으로 감소
scheduler:
  type: cosine
  T_max: 100      # epochs와 동일하게 설정
  eta_min: 0.001  # 최솟값 lr

model:
  name: ee_resnet18
